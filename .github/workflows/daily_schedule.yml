name: Ejecución Diaria de Garantías

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Restaurar caché de archivos descargados
      uses: actions/cache@v3
      with:
        path: ./Garantías
        key: garantias-${{ github.run_id }}
        restore-keys: |
          garantias-

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # Aseguramos que se instalen las nuevas librerías de Google
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Diagnóstico API portal XM
      run: |
        echo "=== Nuevo endpoint: api-portalxm.xm.com.co ==="
        echo "--- Semanal 17ABR ---"
        curl -s -w "\nHTTP status: %{http_code}\n" \
          "https://api-portalxm.xm.com.co/administracion-archivos/ficheros/descarga-archivo?ruta=Energia%20y%20Mercado/Garantias%20Semanales/2026/04.%20Abril/GARANTIA%20SEMANAL%2017ABR-2026.xlsx&nombreBlobContainer=storageportalxm" \
          -o /dev/null 2>&1 || true
        echo "--- Cuentas 10ABR ---"
        curl -s -w "\nHTTP status: %{http_code}\n" \
          "https://api-portalxm.xm.com.co/administracion-archivos/ficheros/descarga-archivo?ruta=Agentes/SaldosDiariosCuentasCustodia/Saldo%20cuenta%20custodia%202026-04-10.xlsx&nombreBlobContainer=storageportalxm" \
          -o /dev/null 2>&1 || true

    - name: Ejecutar script diario
      run: python run_daily.py
      
    - name: Debug - Listar archivos actuales
      run: ls -R

    # Nuevo paso: Subida con Python y Service Account
    - name: Sincronizar a Google Drive (User OAuth)
      env:
        GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }} # <--- CAMBIO AQUÍ
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        LOCAL_UPLOAD_PATH: "./Garantías"
      run: |
        mkdir -p ./Garantías
        python upload_drive.py
