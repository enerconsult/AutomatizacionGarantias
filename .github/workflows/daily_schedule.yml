name: Ejecución Diaria de Garantías

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v3
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Eliminamos el paso de "Instalar rclone" ya que no se usa

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        # Aseguramos que se instalen las nuevas librerías de Google
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Diagnóstico SSL portal XM
      run: |
        echo "=== Mensual 08ABR - TLS 1.3 + headers de navegador (cuerpo completo) ==="
        curl -s --tlsv1.3 \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          -H "Referer: https://app-portalxmcore01.azurewebsites.net/" \
          -w "\n--- HTTP status: %{http_code} ---\n" \
          "https://app-portalxmcore01.azurewebsites.net/administracion-archivos/ficheros/descarga-archivo?ruta=Energia+y+Mercado%2FGarantias+Mensuales%2F2026%2F04.+Abril%2FGARANTIA+SEMANAL+MENSUAL+08ABR-2026.xlsx&nombreBlobContainer=storageportalxm" 2>&1 || true
        echo ""
        echo "=== Cuentas 10ABR - TLS 1.3 + headers (cuerpo completo) ==="
        curl -s --tlsv1.3 \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          -H "Referer: https://app-portalxmcore01.azurewebsites.net/" \
          -w "\n--- HTTP status: %{http_code} ---\n" \
          "https://app-portalxmcore01.azurewebsites.net/administracion-archivos/ficheros/descarga-archivo?ruta=Agentes%2FSaldosDiariosCuentasCustodia%2FSaldo+cuenta+custodia+2026-04-10.xlsx&nombreBlobContainer=storageportalxm" 2>&1 || true
        echo ""
        echo "=== Test sin --tlsv1.3 (negociacion libre) ==="
        curl -s -w "\n--- HTTP status: %{http_code} ---\n" \
          -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
          "https://app-portalxmcore01.azurewebsites.net/administracion-archivos/ficheros/descarga-archivo?ruta=Energia+y+Mercado%2FGarantias+Mensuales%2F2026%2F04.+Abril%2FGARANTIA+SEMANAL+MENSUAL+08ABR-2026.xlsx&nombreBlobContainer=storageportalxm" 2>&1 || true

    - name: Ejecutar script diario
      run: python run_daily.py
      
    - name: Debug - Listar archivos actuales
      run: ls -R

    # Nuevo paso: Subida con Python y Service Account
    - name: Sincronizar a Google Drive (User OAuth)
      env:
        GDRIVE_TOKEN_JSON: ${{ secrets.GDRIVE_TOKEN_JSON }} # <--- CAMBIO AQUÍ
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        LOCAL_UPLOAD_PATH: "./Garantías"
      run: |
        mkdir -p ./Garantías
        python upload_drive.py
